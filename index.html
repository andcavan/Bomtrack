<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bomtrack — Distinte Base & Costificazione</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body>

<div id="toast"></div>
<div id="modal-root"></div>

<!-- ACCESSO — al primo avvio (nessun utente) diventa la creazione dell'amministratore -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7l9-4 9 4-9 4-9-4z"/><path d="M3 7v10l9 4 9-4V7"/><path d="M12 11v10"/></svg>
    </div>
    <h1 class="login-title">Bomtrack<sup class="app-version" id="app-version-login" title="Revisione in esecuzione"></sup></h1>
    <p class="login-sub" id="login-sub">Distinte base &amp; Costificazione</p>
    <form id="login-form" onsubmit="return false">
      <div class="login-field" id="login-setup-fields" style="display:none">
        <input type="text" id="login-name" placeholder="Nome e cognome" autocomplete="name" onkeydown="if(event.key==='Enter')submitLogin()">
      </div>
      <div class="login-field">
        <input type="email" id="login-email" placeholder="Email" autocomplete="username" onkeydown="if(event.key==='Enter')submitLogin()">
      </div>
      <div class="login-field">
        <input type="password" id="login-password" placeholder="Password" autocomplete="current-password" onkeydown="if(event.key==='Enter')submitLogin()">
      </div>
      <div class="login-remember" id="login-remember-row">
        <label><input type="checkbox" id="login-remember"> Ricordami su questo PC</label>
      </div>
      <div id="login-error" class="login-error" style="display:none"></div>
      <button class="add-btn-sm" id="login-submit" style="width:100%;justify-content:center" onclick="submitLogin()">Accedi</button>
    </form>
    <p class="login-note">I dati risiedono in questo browser: l'accesso separa i ruoli tra colleghi, non protegge i dati.</p>
  </div>
</div>

<header id="app-header" style="display:none">
  <div style="display:flex;align-items:center;gap:10px">
    <span class="logo">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7l9-4 9 4-9 4-9-4z"/><path d="M3 7v10l9 4 9-4V7"/><path d="M12 11v10"/></svg>
      Bomtrack
    </span>
    <span class="app-version" id="app-version" title="Revisione in esecuzione"></span>
  </div>
  <nav class="nav" id="main-nav"></nav>
  <div class="header-right">
    <span class="header-clock" id="header-clock"></span>
    <span class="user-pill" id="user-pill"></span>
    <button class="btn-outline btn-icon btn-emoji" onclick="changePassword()" title="Cambia password" aria-label="Cambia password">🔑</button>
    <button class="btn-outline btn-icon" onclick="logout()" title="Esci" aria-label="Esci">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
    </button>
  </div>
</header>

<div id="app-main" style="display:none">

  <!-- DISTINTE BASE -->
  <div id="view-bom" class="view-panel active">
    <div class="bom-toolbar">
      <h2 class="section-title">🌳 Distinta Base &amp; Costificazione</h2>
      <div class="field-group" style="position:relative">
        <label>Macchina / Prodotto</label>
        <select id="bom-select" onchange="onBomSelect()"></select>
      </div>
      <button class="add-btn-sm" onclick="newMachineModal()">+ Nuova macchina</button>
      <button class="btn-outline" id="bom-edit-btn" onclick="editCurrentItemModal()">✏ Modifica testata</button>
      <button class="btn-outline" id="bom-del-btn" onclick="deleteCurrentMachine()">🗑 Elimina</button>
    </div>

    <div id="bom-cost-summary" class="cost-summary"></div>

    <div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap">
      <button class="add-btn-sm" id="bom-add-comp" onclick="addComponentModal()">+ Aggiungi componente</button>
      <button class="btn-outline" id="bom-add-op" onclick="addOperationModal()">+ Aggiungi lavorazione</button>
      <button class="btn-outline" onclick="expandAllBom(true)">⊞ Espandi tutto</button>
      <button class="btn-outline" onclick="expandAllBom(false)">⊟ Comprimi tutto</button>
    </div>

    <div class="bom-tree" id="bom-tree"></div>
  </div>

  <!-- ARTICOLI D'ACQUISTO (commerciali e materie prime) -->
  <div id="view-buy" class="view-panel">
    <h2 class="section-title">📦 Commerciali &amp; Materie prime</h2>
    <div class="catalog-filters">
      <input type="text" class="search" id="buy-search" placeholder="🔍 Cerca codice o nome..." oninput="renderCatalog('buy')">
      <select id="buy-type" onchange="onCatTypeChange('buy')">
        <option value="">Tutti i tipi</option>
        <option value="acquistato">Componente commerciale</option>
        <option value="materiale">Materia prima</option>
      </select>
      <select id="buy-family" onchange="onCatFamilyChange('buy')">
        <option value="">Tutte le famiglie</option>
      </select>
      <select id="buy-subfamily" onchange="renderCatalog('buy')">
        <option value="">Tutte le sottofamiglie</option>
      </select>
      <button class="btn-outline fav-filter" id="buy-fav" title="Mostra solo i preferiti" onclick="toggleFavFilter()">★ Solo preferiti</button>
      <button class="add-btn-sm" onclick="newItemModal('buy')">+ Nuovo articolo</button>
    </div>
    <div class="table-wrap" id="buy-table"></div>
  </div>

  <!-- ARTICOLI DI PROGETTO (macchine, gruppi, sottogruppi, parti) -->
  <div id="view-design" class="view-panel">
    <h2 class="section-title">🏗 Macchine, Gruppi &amp; Parti</h2>
    <div class="catalog-filters">
      <input type="text" class="search" id="des-search" placeholder="🔍 Cerca codice o nome..." oninput="renderCatalog('design')">
      <select id="des-type" onchange="onCatTypeChange('design')">
        <option value="">Tutti i tipi</option>
        <option value="macchina">Macchina</option>
        <option value="gruppo">Gruppo</option>
        <option value="sottogruppo">Sottogruppo</option>
        <option value="parte">Parte (lavorato)</option>
      </select>
      <select id="des-family" onchange="onCatFamilyChange('design')">
        <option value="">Tutte le famiglie</option>
      </select>
      <select id="des-subfamily" onchange="renderCatalog('design')">
        <option value="">Tutte le sottofamiglie</option>
      </select>
      <button class="add-btn-sm" onclick="newItemModal('design')">+ Nuovo articolo</button>
    </div>
    <div class="table-wrap" id="des-table"></div>
  </div>

  <!-- COSTIFICAZIONE & REPORT -->
  <div id="view-report" class="view-panel">
    <h2 class="section-title">💶 Costificazione &amp; Report</h2>
    <div class="bom-toolbar">
      <div class="field-group" style="position:relative">
        <label>Macchina / Prodotto</label>
        <select id="report-select" onchange="renderReport()"></select>
      </div>
      <button class="export-btn-xls" onclick="exportBomExcel()">📗 Esporta Excel</button>
      <button class="export-btn-pdf" onclick="exportBomPDF()">📄 Esporta PDF</button>
    </div>
    <div id="report-content"></div>
  </div>

  <!-- RICHIESTE DI OFFERTA -->
  <div id="view-rfq" class="view-panel"></div>

  <!-- ORDINI A FORNITORE -->
  <div id="view-orders" class="view-panel"></div>

  <!-- GESTIONE -->
  <div id="view-manage" class="view-panel">
    <div class="manage-wrap">
      <h2 class="section-title">⚙ Gestione</h2>
      <div class="mgmt-tabs" id="mgmt-tabs"></div>
      <div id="mgmt-content"></div>
    </div>
  </div>

</div>

<script src="store.js"></script>
<script src="app.js"></script>
</body>
</html>
